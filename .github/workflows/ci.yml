name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic-checks:
    name: Basic static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/remotion/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q start_server.py server.py scripts checks runtime_*.py

      - name: Check frontend JavaScript syntax
        run: |
          node --check static/app.js
          node --check static/flow.js
          node --check static/ai_mask_extension.js
          node --check static/project_profile_extension.js
          node --check static/style_reference_manager_extension.js
          node --check static/storyboard_background_extension.js
          node --check static/one_click_extension.js

      - name: Run visible-flow contract check
        run: node checks/test_visible_flow.js

      - name: Run Step ownership contract check
        run: python checks/test_step_ownership_contract.py

      - name: Run frontend quality checks
        run: node checks/test_frontend_quality.js

      - name: Run source hardening checks
        run: |
          python checks/test_source_hardening.py
          python checks/test_generalized_settings.py
          python checks/test_subtitle_style.py
          python scripts/check_python_startup_hooks.py

      - name: Run runtime hotfix self-check
        run: python scripts/check_runtime_hotfixes.py

      - name: Run settings mask self-check
        env:
          PPT_STUDIO_MASK_SETTINGS_SECRETS: "1"
        run: python scripts/check_runtime_settings_mask.py

      - name: Check Remotion TypeScript
        working-directory: scripts/remotion
        run: |
          npm ci
          npx tsc --noEmit -p tsconfig.json
