cases:
  - id: 2026-06-05-minimax-endpoint-invalid-key
    stage: generate-audio-subtitles
    tags: [external-api, tts, config]
    symptom: "MiniMax t2a_v2 使用 api.minimax.io 返回 invalid api key。"
    root_cause: "当前凭证对应可用 endpoint 是 https://api.minimaxi.com/v1/t2a_v2。"
    resolution: "更新 .env.example、config/task.yaml、scripts/minimax_tts.py 和 generate-audio-subtitles skill。"

  - id: 2026-06-05-remotion-file-url-blocked
    stage: render-video
    tags: [render-error, asset-path]
    symptom: "Remotion/Chrome 渲染时无法加载 file:/// 本地图片。"
    root_cause: "浏览器渲染环境不能可靠读取任意本地 file URL。"
    resolution: "把运行期资源复制到 scripts/remotion/public/runtime/<run_id>/，组件内用 staticFile() 引用。"

  - id: 2026-06-05-video-duration-under-target
    stage: plan-slides
    tags: [duration, planning]
    symptom: "早期版本视频低于目标时长。"
    root_cause: "分镜页数不足，把多个讲解层级压缩在少数页面中。"
    resolution: "扩展 slide 数量，拆出审题、关键词、身份和处理步骤等层级。"

  - id: 2026-06-05-subtitle-vertical-misaligned
    stage: render-video
    tags: [subtitle, layout]
    symptom: "字幕在底部字幕框内视觉偏上。"
    root_cause: "Remotion 字幕容器高度和 bottom 偏移没有匹配底图字幕框。"
    resolution: "字幕容器改为 82px 高，并按固定字幕安全区居中。"

  - id: 2026-06-05-repeated-slide-layouts
    stage: reconstruct-scenes
    tags: [layout, visual-review]
    symptom: "所有页面看起来像同一版式套壳。"
    root_cause: "生成脚本复用同一套卡片坐标和配图区坐标。"
    resolution: "加入多种内容区 layout，并在场景中记录 scene.layout 供审核。"

  - id: 2026-06-05-illustration-built-from-shapes
    stage: reconstruct-scenes
    tags: [imagegen, visual-asset]
    symptom: "配图由 shape/text 拼装，不符合 Image Gen 位图资产规则。"
    root_cause: "元素重建阶段把视觉主体当作可程序绘制图形处理。"
    resolution: "视觉主体统一使用 Image Gen 产出的 PNG，Remotion 不绘制主体内容。"

  - id: 2026-06-07-style-reference-not-bound
    stage: generate-visual-drafts
    tags: [style-reference, prompt, imagegen]
    symptom: "用户指定的 PPT 模板和 PPT 示例没有稳定进入视觉生成流程。"
    root_cause: "参考图路径分散在文档和配置中，没有形成每页可追溯的视觉提示词。"
    resolution: "统一为 PPT模板.png 和 PPT示例.png，并新增 scripts/write_visual_prompts.py。"

  - id: 2026-06-07-visual-content-not-imagegen
    stage: reconstruct-scenes
    tags: [imagegen, scene, remotion]
    symptom: "PPT 主体内容可能由 SVG、前端代码或本地绘图生成。"
    root_cause: "旧流程没有拒绝 scene.elements[] 和 code-native text/shape/line。"
    resolution: "build_remotion_props.py 拒绝 elements[]；Remotion 主路径只接受 PNG layers。"

  - id: 2026-06-07-powershell-utf8-json-false-negative
    stage: preflight-check
    tags: [windows, encoding, json]
    symptom: "PowerShell ConvertFrom-Json 对 UTF-8 中文 JSON 出现乱码或误报。"
    root_cause: "Windows PowerShell 默认编码与 UTF-8 运行产物不一致。"
    resolution: "核心 JSON 读写和校验改用 Python utf-8-sig。"

  - id: 2026-06-07-png-optimization-slow
    stage: reconstruct-scenes
    tags: [performance, png, pillow]
    symptom: "大尺寸 PNG 标准化耗时过长。"
    root_cause: "Pillow PNG optimize=True 对大图压缩过慢。"
    resolution: "PNG optimize 默认关闭，仅在传 --optimize-png 时启用。"

  - id: 2026-06-08-slide-not-decomposed
    stage: reconstruct-scenes
    tags: [decomposition, animation, scene]
    symptom: "生成每页 slide 图片后没有拆成元素，动画只能整页淡入。"
    root_cause: "Stage 3 默认走单个 full_slide 图层；校验器没有阻断单图层生产路径。"
    resolution: "新增 scripts/decompose_slide_layers.py；validate_run_assets.py 增加 --require-layered；AGENTS、README、skills 和 checks 改为 PNG 图层拆解主路径。"

  - id: 2026-06-08-visual-overlap-blocks-decomposition
    stage: generate-visual-drafts
    tags: [visual-overlap, not-animation-friendly, imagegen]
    symptom: "视觉稿中元素重叠、箭头压字或标签粘连，导致 PNG 裁切层不干净。"
    root_cause: "视觉生成提示词没有要求后续拆层所需的留白和对象分离。"
    resolution: "write_visual_prompts.py 和 visual_draft.prompt.md 增加可拆解构图要求：对象之间留 24-40px，禁止压线/压字/重叠，优先 3-7 个可裁切 group。"

  - id: 2026-06-08-imagegen-provenance-bypassed
    stage: generate-visual-drafts
    tags: [imagegen-provenance, invalid-fallback, pipeline-validity, agent-autonomy]
    symptom: "端到端试跑产出了可播放视频，但 visual_draft.png 由本地 PIL 绘图脚本生成，不是 Codex Image Gen 整页位图。"
    root_cause: "流程只校验 PNG 是否存在、是否可拆层和能否渲染，没有校验视觉稿来源；同时没有区分 TTS provider fallback 这类软替代和 Image Gen 阶段替代这类硬违规。"
    resolution: "将本次产物标记为无效生产链路样本；要求每页新增 visual_provenance.json，并在 validate_run_assets.py 增加 --require-imagegen-provenance 后才能进入拆层。"
