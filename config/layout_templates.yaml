canvas:
  width: 1920
  height: 1080
  background: "#FFFDF7"
  subtitle_reserved_height: 150

templates:
  warm_handdrawn_open_content:
    description: 温暖极简手绘线稿风，左上标题区固定，中间开放内容区无大外框，底部字幕区固定留白。
    background: solid_warm_white
    regions:
      title_marker:
        label: 品牌竖线
        role: brand_marker
        x: 60
        y: 65
        w: 10
        h: 75
        fixed: true
        style_token: title_marker
      title_block:
        label: 标题区
        role: title_block
        x: 110
        y: 55
        w: 1600
        h: 165
        fixed: true
        slots:
          main_title:
            label: 主标题
            role: main_title
            x: 0
            y: 0
            w: 1600
            h: 86
            style_token: main_title
          subtitle:
            label: 副标题
            role: subtitle
            x: 0
            y: 95
            w: 1600
            h: 52
            style_token: subtitle
          subtitle_underline:
            label: 副标题横线
            role: subtitle_underline
            x: 0
            y: 150
            w: 210
            h: 6
            style_token: handdrawn_yellow_underline
      content:
        label: 开放内容区
        role: content
        x: 80
        y: 235
        w: 1760
        h: 680
        flexible: true
        frame: none
        includes:
          - explanation_text
          - handdrawn_diagrams
          - token_blocks
          - arrows
          - summary_bar
          - icons
      subtitle_area:
        label: 字幕区
        role: subtitle_overlay
        x: 0
        y: 930
        w: 1920
        h: 150
        fixed: true
        style_token: subtitle_overlay
    constraints:
      - 背景固定为 #FFFDF7。
      - 主标题和副标题必须左上对齐。
      - 左侧竖线和副标题横线必须固定存在。
      - 中间内容区不生成大圆角外框，不画 enclosing content frame。
      - 内容可在开放区域内自由排布，但不得进入底部字幕区。
      - 底部字幕区不生成 PPT 内容。
      - 一页最多使用 3 种强调色。
      - 每页只讲一个核心概念或一个核心问题。

  fixed_title_free_content:
    description: 兼容旧名称，实际使用 warm_handdrawn_open_content 的布局约束。
    background: solid_warm_white
    regions:
      title_marker:
        label: 品牌竖线
        role: brand_marker
        x: 60
        y: 65
        w: 10
        h: 75
        fixed: true
      title_block:
        label: 标题区
        role: title_block
        x: 110
        y: 55
        w: 1600
        h: 165
        fixed: true
      content:
        label: 开放内容区
        role: content
        x: 80
        y: 235
        w: 1760
        h: 680
        flexible: true
        frame: none
      subtitle_area:
        label: 字幕区
        role: subtitle_overlay
        x: 0
        y: 930
        w: 1920
        h: 150
        fixed: true
