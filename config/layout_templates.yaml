canvas:
  width: 1920
  height: 1080
  subtitle_reserved_height: 120

templates:
  fixed_title_free_content:
    description: 固定标题组合区，中部内容自由编排，底部固定字幕区。适合作为默认通用内容页。
    background: paper_texture_with_subtitle_band
    regions:
      title_block:
        label: 标题区
        role: title_block
        x: 120
        y: 72
        w: 1680
        h: 128
        fixed: true
        slots:
          main_title:
            label: 主标题
            role: main_title
            x: 0
            y: 0
            w: 1680
            h: 66
            style_token: main_title
          subtitle:
            label: 副标题
            role: subtitle
            x: 0
            y: 78
            w: 1680
            h: 34
            style_token: subtitle
      content:
        label: 内容区
        role: content
        x: 120
        y: 224
        w: 1680
        h: 704
        flexible: true
        includes:
          - body_points
          - diagrams
          - illustrations
          - charts
          - highlight_blocks
      subtitle_area:
        label: 字幕区
        role: subtitle_overlay
        x: 0
        y: 960
        w: 1920
        h: 120
        style_token: subtitle_overlay
    constraints:
      - 标题区固定，不随页面内容改变位置、字号或颜色。
      - 主标题固定 58px 深蓝色，副标题固定 24px 暖灰深色。
      - 主标题和副标题在同一个标题区内上下排列，默认横向占满安全区宽度。
      - 内容区是一个整体容器，正文、配图、流程图、概念图、重点块都可以在区域内自由编排。
      - 内容区信息点数量由内容决定，正文建议 24 到 32px；信息过密时优先拆页或减少装饰。
      - 内容区不得侵入标题区和底部字幕区。
