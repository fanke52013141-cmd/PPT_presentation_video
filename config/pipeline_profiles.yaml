version: pipeline_profile_v1
production_invariants_ref: config/production_invariants.yaml

storyboard:
  slide_count:
    short_article: "4-6"
    medium_article: "6-8"
    long_article: "8-12"
  visual_group_count:
    short_article: "2-5"
    medium_article: "3-5"
    long_article: "3-6"
  required_slide_fields:
    - slide_id
    - main_title
    - visual_groups
    - narration_beats
  optional_slide_fields:
    - subtitle
    - core_message
    - layout_type
    - visual_metaphor
    - composition
    - structure_notes
  presentation_policy_rules:
    - 顶层必须输出 presentation_policy。
    - subtitle_policy 必须由 AI 根据文章和版式统一决策，只能是 all_slides_have_subtitle 或 no_slides_have_subtitle。
    - 如果 subtitle_policy 是 all_slides_have_subtitle，则每页 subtitle 必须非空；如果是 no_slides_have_subtitle，则每页不要生成 subtitle。
    - 副标题策略一旦确定，必须对所有 Slide 一致，不能逐页随机。
    - presentation_policy 应包含 subtitle_rationale、default_visual_group_count、layout_diversity。
  layout_types:
    - hero_diagram
    - left_right_comparison
    - process_flow
    - cause_effect_chain
    - central_mindmap
    - timeline
    - three_card_framework
    - problem_solution
    - pyramid
    - before_after
    - metaphor_scene
    - data_callout
    - checklist
    - summary_takeaway
    - custom
  roles:
    title:
      label: 主标题
      description: 页面主标题，生产铁律要求每页必须有。
      default_reveal: wipe_left_to_right
    subtitle:
      label: 副标题
      description: 只能在 presentation_policy.subtitle_policy 为 all_slides_have_subtitle 时出现。
      default_reveal: wipe_left_to_right
    content_body:
      label: 正文内容
      description: 普通概念、要点、卡片、列表或解释性文字。
      default_reveal: wipe_left_to_right
    diagram:
      label: 图示/流程图
      description: 图形、流程、关系图、对比图、时间线等。
      default_reveal: wipe_left_to_right
    quote:
      label: 引用/金句
      description: 原文摘录、关键判断或一句话结论。
      default_reveal: wipe_left_to_right
    data_point:
      label: 数据/数字
      description: 数字、指标、公式或表格单元。
      default_reveal: wipe_left_to_right
    process_step:
      label: 步骤
      description: 流程中的单步节点。
      default_reveal: wipe_left_to_right
    callout:
      label: 强调提示
      description: 需要突出强调的提示、风险或反直觉点。
      default_reveal: wipe_left_to_right
    annotation:
      label: 注释
      description: 箭头标注、旁注、补充说明。
      default_reveal: wipe_left_to_right
    summary:
      label: 总结
      description: 用于收束页面观点；是否生成由内容需要决定。
      default_reveal: wipe_left_to_right
    decoration:
      label: 装饰
      description: 不承载核心语义的装饰元素。
      default_reveal: wipe_left_to_right
  structure_rules:
    - visual_groups 可以使用 roles 中的任意角色，也可以使用自定义 role；具体结构完全由页面内容决定。
    - 每页先选择 layout_type、visual_metaphor 和 composition，再定义 visual_groups。
    - 如果某页适合表格、流程、对比、时间线、引用、数据卡片或 FAQ，可以直接用对应结构组织，不要固定套用“主标题/副标题/正文/总结”模板。
    - narration_beats 是是否朗读的唯一依据；有对应 beat 的 visual_group 才进入演讲稿，没有 beat 的 visual_group 只用于画面展示。
    - 不要为了覆盖全部 visual_groups 强行生成 narration_beat；演讲稿只讲真正需要讲解的内容。
    - 每页建议 2-6 个语义 visual_groups；优先一个强主视觉加若干辅助视觉组，而不是平均分布的孤立卡片。
    - 每个 visual_group 仍然要能被一个人工 Mask 或矩形区域完整覆盖；允许清晰箭头、括号、流程线连接，但禁止严重遮挡、箭头穿字和跨组粘连。
    - 底部 y=930..1080 是视频字幕安全区，结构规划时不得依赖该区域承载任何内容或装饰。

image_prompt:
  opening: "请生成一张 16:9 的完整 PPT/讲解页静态主图。"
  invariant_rules:
    - 每页必须有清晰主标题。
    - 副标题由 presentation_policy.subtitle_policy 统一决定；如果为 no_slides_have_subtitle，所有页面都不要副标题、不要副标题下划线、不要副标题占位。
    - 生图背景固定为纯白 #FFFFFF，四角和四边必须连续纯白；风格包不得覆盖该规则。
    - 画布按 1920x1080 构图，底部 y=930..1080 是字幕安全区，不得出现任何文字、图标、箭头、装饰、阴影、人物、残片或视觉碎片。
    - 不允许严重遮挡、箭头穿字、文字压线、无关语义组粘连。
    - 主体内容来自这张完整位图，视频阶段不再用 HTML 重画 PPT 正文。
  creative_rules:
    - 根据 slide 的 layout_type、visual_metaphor 和 composition 自由选择版式，不要固定套用卡片模板。
    - 优先使用一个强主视觉加 2-4 个辅助语义组；只有列表/对比/清单页才使用多个均等卡片。
    - 允许使用箭头、括号、路径、流程线、图标、局部高亮、编号贴纸、批注和强调符号增强表达力。
    - 语义组必须可人工 Mask；可以建立视觉关系，但连接线不要穿过文字，不要把无关组融合成一团。
    - 避免密集段落和小字，页面文字只保留主标题、短标签、关键词和必要结论。

reveal:
  default_duration_sec: 0.75
  min_duration_sec: 0.05
  sync_duration_cap_sec: 0.12
  default_by_role:
    title:
      type: wipe_left_to_right
      duration: 0.55
    subtitle:
      type: wipe_left_to_right
      duration: 0.75
    content_body:
      type: wipe_left_to_right
      duration: 0.75
    diagram:
      type: wipe_left_to_right
      duration: 0.75
    quote:
      type: wipe_left_to_right
      duration: 0.65
    data_point:
      type: wipe_left_to_right
      duration: 0.75
    process_step:
      type: wipe_left_to_right
      duration: 0.65
    callout:
      type: wipe_left_to_right
      duration: 0.75
    annotation:
      type: wipe_left_to_right
      duration: 0.55
    summary:
      type: wipe_left_to_right
      duration: 0.75
    decoration:
      type: wipe_left_to_right
      duration: 0.75
  allowed_actions:
    - fade_in
    - fade_up
    - soft_zoom_in
    - slide_in_left
    - highlight
    - cover_fade_out
    - cover_wipe_left_to_right
    - cover_wipe_top_to_bottom
    - fog_diagonal_erase
    - crop_fade_up
    - crop_slide_in_left
    - crop_soft_zoom_in
    - wipe_left_to_right
    - wipe_right_to_left
    - wipe_top_to_bottom
    - wipe_bottom_to_top
    - scratch_reveal
    - brush_wipe_left_to_right
    - sticker_pop
    - stamp_in
    - paper_drop

tts:
  default_provider: minimax
  providers:
    minimax:
      api_key_env: MINIMAX_API_KEY
      endpoint_env: MINIMAX_TTS_ENDPOINT
      default_endpoint: https://api.minimaxi.com/v1/t2a_async_v2
      default_model: speech-2.8-hd
      default_voice_id: Chinese (Mandarin)_Soft_Girl
    aliyun_cosyvoice:
      api_key_env: DASHSCOPE_API_KEY
      default_endpoint: https://dashscope.aliyuncs.com/api/v1
      default_model: cosyvoice-v3-flash
      default_voice_id: longxiaochun
      clone_supported: true
    tencent_tts:
      secret_id_env: TENCENTCLOUD_SECRET_ID
      secret_key_env: TENCENTCLOUD_SECRET_KEY
      default_endpoint: https://tts.tencentcloudapi.com
      default_region: ap-guangzhou
      default_model: "1"
      default_voice_id: "101001"
      clone_supported: true
      clone_voice_field: FastVoiceType
    volcengine_seed:
      api_key_env: VOLCENGINE_TTS_TOKEN
      default_endpoint: https://openspeech.bytedance.com/api/v1/tts
      default_model: seed-tts-1.1
      default_voice_id: zh_female_qingxinnvsheng_mars_bigtts
      clone_supported: true
      provider_extra_hint:
        appid: "火山控制台 AppID"
        cluster: "volcano_tts 或控制台分配的 cluster"
        resource_id: "V3/ICL 场景可配置 X-Api-Resource-Id，例如 seed-tts-2.0 或 seed-icl-1.0"
