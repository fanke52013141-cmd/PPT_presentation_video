version: pipeline_profile_v1
production_invariants_ref: config/production_invariants.yaml

storyboard:
  slide_count:
    short_article: "4-6"
    medium_article: "6-8"
    long_article: "8-12"
  visual_anchor_count:
    short_article: "2-4"
    medium_article: "2-5"
    long_article: "3-5"
  required_slide_fields:
    - slide_id
    - main_title
    - narration
  optional_slide_fields:
    - core_message
    - body_content
    - visual_intent
    - visual_groups
    - narration_beats
  presentation_policy_rules:
    - 顶层必须输出 presentation_policy。
    - subtitle_policy 固定为 no_slides_have_subtitle；所有 Slide 都不要生成页面副标题。
    - presentation_policy 应包含 subtitle_rationale、default_visual_anchor_count、layout_freedom。
  roles:
    title:
      label: 主标题
      description: 页面主标题，生产铁律要求每页必须有。
      default_reveal: crop_fade_up
    body_content:
      label: 正文内容
      description: 页面除主标题之外的全部内容；不要再细分成图示、数据、总结、流程等固定角色。
      default_reveal: crop_fade_up
  structure_rules:
    - 分镜阶段只做叙事规划，不做细粒度版式拆解。
    - 每页只需要确定 main_title、core_message、body_content/narration，以及页面想表达的 visual_intent；不生成页面副标题。
    - 不要把正文预先拆成“图示/流程图、数据/数字、总结、引用、步骤”等固定 role；这些都属于 body_content，由生图阶段根据演讲稿自由表现。
    - visual_groups 如果出现，只表示后续 Mask/Reveal 可参考的画面锚点，不是前置版式模板。
    - narration_beats 用于说明演讲稿的节奏；不要为了覆盖全部 visual_groups 强行生成 narration_beat。
    - 每页建议 2-5 个视觉锚点；可以少于正文要点数，允许一个强主视觉承载多个讲解点。
    - 生图阶段先根据演讲稿绘制完整页面，再根据画面元素和演讲稿建立锚点匹配；不要在分镜阶段把画面固定死。
    - 所有视觉锚点都必须能被人工 Mask 或矩形区域完整覆盖；允许清晰箭头、括号、流程线连接，但严禁元素重叠、严重遮挡、箭头穿字和跨组粘连。
    - 底部 y=930..1080 是视频字幕安全区，结构规划时不得依赖该区域承载任何内容或装饰。

image_prompt:
  opening: "请生成一张 16:9 的完整 PPT/讲解页静态主图。"
  invariant_rules:
    - 每页必须有清晰主标题。
    - 所有页面都不要副标题、不要副标题下划线、不要副标题占位。
    - 主标题固定在上方标题区；底部视频字幕位置固定保留。其他内容区可根据内容自由发挥。
    - 生图背景固定为纯白 #FFFFFF，四角和四边必须连续纯白；风格包不得覆盖该规则。
    - 画布按 1920x1080 构图，底部 y=930..1080 是字幕安全区，不得出现任何文字、图标、箭头、装饰、阴影、人物、残片或视觉碎片。
    - 严禁画面元素重叠：文字、图标、箭头、线条、标签、卡片边框、人物和装饰之间不得互相覆盖、穿插、压住或粘连。
    - 不允许严重遮挡、箭头穿字、文字压线、无关语义组粘连。
    - 主体内容来自这张完整位图，视频阶段不再用 HTML 重画 PPT 正文。
  creative_rules:
    - 先理解演讲稿和 core_message，再自由设计整页画面；不要先按固定 role 分块。
    - 除主标题外，其余正文内容都可以用图、文字、符号、箭头、场景、隐喻或卡片自由表达。
    - 优先让画面整体表达意思，而不是平均摆放多个孤立内容块。
    - visual_groups 只作为后续 Mask/Reveal 的锚点提示；不要为了锚点把页面强行画成多块卡片。
    - 可以使用箭头、括号、路径、流程线、图标、局部高亮、编号贴纸、批注和强调符号增强表达力。
    - 保持可人工 Mask：连接线不要穿过文字，不要严重遮挡，不要把无关区域融合成一团。
    - 避免密集段落和小字，页面文字只保留主标题、短标签、关键词和必要结论。

reveal:
  default_duration_sec: 0.25
  min_duration_sec: 0.05
  sync_duration_cap_sec: 0.12
  default_by_role:
    title:
      type: crop_fade_up
      duration: 0.25
    subtitle:
      type: crop_fade_up
      duration: 0.25
    body_content:
      type: crop_fade_up
      duration: 0.25
    content_body:
      type: crop_fade_up
      duration: 0.25
  allowed_actions:
    - fade_in
    - fade_up
    - soft_zoom_in
    - slide_in_left
    - highlight
    - cover_fade_out
    - cover_wipe_left_to_right
    - cover_wipe_top_to_bottom
    - fog_diagonal_erase
    - crop_fade_up
    - crop_slide_in_left
    - crop_soft_zoom_in
    - wipe_left_to_right
    - wipe_right_to_left
    - wipe_top_to_bottom
    - wipe_bottom_to_top
    - scratch_reveal
    - brush_wipe_left_to_right
    - sticker_pop
    - stamp_in
    - paper_drop

tts:
  default_provider: minimax
  providers:
    minimax:
      api_key_env: MINIMAX_API_KEY
      endpoint_env: MINIMAX_TTS_ENDPOINT
      default_endpoint: https://api.minimaxi.com/v1/t2a_async_v2
      default_model: speech-2.8-hd
      default_voice_id: Chinese (Mandarin)_Soft_Girl
    aliyun_cosyvoice:
      api_key_env: DASHSCOPE_API_KEY
      default_endpoint: https://dashscope.aliyuncs.com/api/v1
      default_model: cosyvoice-v3-flash
      default_voice_id: longxiaochun
      clone_supported: true
    tencent_tts:
      secret_id_env: TENCENTCLOUD_SECRET_ID
      secret_key_env: TENCENTCLOUD_SECRET_KEY
      default_endpoint: https://tts.tencentcloudapi.com
      default_region: ap-guangzhou
      default_model: "1"
      default_voice_id: "101001"
      clone_supported: true
      clone_voice_field: FastVoiceType
    volcengine_seed:
      api_key_env: VOLCENGINE_TTS_TOKEN
      default_endpoint: https://openspeech.bytedance.com/api/v1/tts
      default_model: seed-tts-1.1
      default_voice_id: zh_female_qingxinnvsheng_mars_bigtts
      clone_supported: true
      provider_extra_hint:
        appid: "火山控制台 AppID"
        cluster: "volcano_tts 或控制台分配的 cluster"
        resource_id: "V3/ICL 场景可配置 X-Api-Resource-Id，例如 seed-tts-2.0 或 seed-icl-1.0"
