version: pipeline_profile_v1

storyboard:
  slide_count:
    short_article: "4-6"
    medium_article: "6-8"
    long_article: "8-12"
  visual_group_count:
    short_article: "3-7"
    medium_article: "4-8"
    long_article: "4-9"
  required_slide_fields:
    - slide_id
    - main_title
    - visual_groups
    - narration_beats
  optional_slide_fields:
    - subtitle
    - core_message
    - layout_type
    - structure_notes
  roles:
    title:
      label: 主标题
      description: 页面固定主标题区域；只作为页面主题锚点，不限制主体内容结构。
      default_reveal: wipe_left_to_right
    subtitle:
      label: 副标题
      description: 页面固定副标题区域；用于补充本页理解角度，可按内容需要为空或很短。
      default_reveal: wipe_left_to_right
    content_body:
      label: 正文内容
      description: 后处理语义标签；可承载任何为讲清楚内容而需要的文字、卡片、场景、判断链或结构块。
      default_reveal: wipe_left_to_right
    diagram:
      label: 图示/流程图
      description: 后处理语义标签；用于流程、关系、对比、时间线、判断链、对象地图、推理路径等可视化结构。
      default_reveal: wipe_left_to_right
    quote:
      label: 引用/金句
      description: 原文摘录、关键判断或一句话结论。
      default_reveal: wipe_left_to_right
    data_point:
      label: 数据/数字
      description: 数字、指标、公式或表格单元。
      default_reveal: wipe_left_to_right
    process_step:
      label: 步骤
      description: 流程中的单步节点。
      default_reveal: wipe_left_to_right
    callout:
      label: 强调提示
      description: 需要突出强调的提示、风险或反直觉点。
      default_reveal: wipe_left_to_right
    annotation:
      label: 注释
      description: 箭头标注、旁注、补充说明。
      default_reveal: wipe_left_to_right
    summary:
      label: 总结
      description: 用于收束页面观点；是否生成由内容需要决定。
      default_reveal: wipe_left_to_right
    decoration:
      label: 装饰
      description: 不承载核心语义的装饰元素。
      default_reveal: wipe_left_to_right
  structure_rules:
    - 分镜首先服务于“把内容讲清楚”，不要从角色清单或固定版式出发；先规划每页的理解路径、演讲稿和视觉表达，再给结果标注 role。
    - 主标题、副标题使用页面上方固定区域；底部 y=930..1080 是固定字幕安全区。除这三处外，主体内容区可以根据内容自由发挥。
    - visual_groups 只是后续 Mask、动画和旁白绑定的生产接口，不是内容设计模板；role 可以使用内置值，也可以使用自定义 role。
    - 如果某页适合判断链、冲突地图、对象关系图、推理路径、时间压力图、对比、表格、流程、FAQ、场景拆解或行动清单，就直接使用最能讲清楚的结构。
    - 每页应先有自然演讲稿或讲解节奏，再决定画面上显示哪些关键词、图形和结构；不要把演讲稿降级成 visible_text 的重复朗读。
    - narration_beats 是是否朗读的唯一依据；有对应 beat 的 visual_group 才进入演讲稿，没有 beat 的 visual_group 只用于画面展示。
    - 不要为了覆盖全部 visual_groups 强行生成 narration_beat；演讲稿只讲真正需要讲解的内容。
    - 每个 visual_group 必须能被一个人工 Mask 或矩形区域完整覆盖；独立视觉元素、文字、箭头、卡片、图标之间严禁重叠、压住、穿插或粘连。

image_prompt:
  opening: "请生成一张 16:9 的完整 PPT/讲解页静态主图。"
  invariant_rules:
    - 页面上方主标题、副标题位置固定；底部 y=930..1080 固定留作视频字幕安全区。
    - 主体内容区是开放画布，必须根据本页内容自由选择最能讲清楚的视觉表达，不要机械套用卡片列表。
    - 每个 visual_group 必须作为独立视觉岛出现，组与组之间保留清晰空白，方便后续人工 Mask。
    - 严禁画面元素重叠：文字、卡片、图标、箭头、线条、标签、装饰、图表之间不得互相覆盖、压住、穿插或粘连。
    - 每个分组指定的 visible_text 必须清晰、完整、原样出现；不要改写、漏字或生成乱码。
    - 不要把不同 visual_group 的文字、线条、箭头和装饰粘连在一起。
    - 画布按 1920x1080 构图，底部 y=930..1080 留作视频字幕安全区。
    - 不要绘制包围整页内容的大外框；主体内容来自这张完整位图，视频阶段不再用 HTML 重画 PPT 正文。

reveal:
  default_duration_sec: 0.75
  min_duration_sec: 0.05
  sync_duration_cap_sec: 0.12
  default_by_role:
    title:
      type: wipe_left_to_right
      duration: 0.55
    subtitle:
      type: wipe_left_to_right
      duration: 0.75
    content_body:
      type: wipe_left_to_right
      duration: 0.75
    diagram:
      type: wipe_left_to_right
      duration: 0.75
    quote:
      type: wipe_left_to_right
      duration: 0.65
    data_point:
      type: wipe_left_to_right
      duration: 0.75
    process_step:
      type: wipe_left_to_right
      duration: 0.65
    callout:
      type: wipe_left_to_right
      duration: 0.75
    annotation:
      type: wipe_left_to_right
      duration: 0.55
    summary:
      type: wipe_left_to_right
      duration: 0.75
    decoration:
      type: wipe_left_to_right
      duration: 0.75
  allowed_actions:
    - fade_in
    - fade_up
    - soft_zoom_in
    - slide_in_left
    - highlight
    - cover_fade_out
    - cover_wipe_left_to_right
    - cover_wipe_top_to_bottom
    - fog_diagonal_erase
    - crop_fade_up
    - crop_slide_in_left
    - crop_soft_zoom_in
    - wipe_left_to_right
    - wipe_right_to_left
    - wipe_top_to_bottom
    - wipe_bottom_to_top
    - scratch_reveal
    - brush_wipe_left_to_right
    - sticker_pop
    - stamp_in
    - paper_drop

tts:
  default_provider: minimax
  providers:
    minimax:
      api_key_env: MINIMAX_API_KEY
      endpoint_env: MINIMAX_TTS_ENDPOINT
      default_endpoint: https://api.minimaxi.com/v1/t2a_async_v2
      default_model: speech-2.8-hd
      default_voice_id: Chinese (Mandarin)_Soft_Girl
    aliyun_cosyvoice:
      api_key_env: DASHSCOPE_API_KEY
      default_endpoint: https://dashscope.aliyuncs.com/api/v1
      default_model: cosyvoice-v3-flash
      default_voice_id: longxiaochun
      clone_supported: true
    tencent_tts:
      secret_id_env: TENCENTCLOUD_SECRET_ID
      secret_key_env: TENCENTCLOUD_SECRET_KEY
      default_endpoint: https://tts.tencentcloudapi.com
      default_region: ap-guangzhou
      default_model: "1"
      default_voice_id: "101001"
      clone_supported: true
      clone_voice_field: FastVoiceType
    volcengine_seed:
      api_key_env: VOLCENGINE_TTS_TOKEN
      default_endpoint: https://openspeech.bytedance.com/api/v1/tts
      default_model: seed-tts-1.1
      default_voice_id: zh_female_qingxinnvsheng_mars_bigtts
      clone_supported: true
      provider_extra_hint:
        appid: "火山控制台 AppID"
        cluster: "volcano_tts 或控制台分配的 cluster"
        resource_id: "V3/ICL 场景可配置 X-Api-Resource-Id，例如 seed-tts-2.0 或 seed-icl-1.0"
