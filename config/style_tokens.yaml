  aspect_ratio: "16:9"
  width: 1920
  height: 1080
  background: "#FFFDF7"
  safe_margin:
    x: 60
    y: 55
  subtitle_reserved:
    height: 150
    y: 930

colors:
  background: "#FFFDF7"
  surface: "#FFFDF7"
  ink: "#111111"
  muted_ink: "#1A1A1A"
  subtle_ink: "#4A4A4A"
  line: "#111111"
  yellow: "#F9D65C"
  yellow_deep: "#F4C542"
  yellow_soft: "#FFF3BF"
  green_soft: "#D9F0A3"
  blue_soft: "#BDE0FE"
  subtitle_text: "#111111"
  subtitle_background: "warm_white_82"
  paper: "#FFFDF7"

layout:
  title_marker:
    x: 60
    y: 65
    w: 10
    h: 75
  title_block:
    main_title:
      x: 110
      y: 55
      w: 1600
      h: 86
    subtitle:
      x: 110
      y: 150
      w: 1600
      h: 52
    subtitle_underline:
      x: 110
      y: 205
      w: 210
      h: 6
  content:
    x: 80
    y: 235
    w: 1760
    h: 680
    frame: none
  subtitle_area:
    x: 0
    y: 930
    w: 1920
    h: 150
    fixed: true

scene_layers:
  model: png_layers_only
  description: Remotion 只显示 PNG 图层，不绘制 text、shape、line 或 group。
  required_output_field: layers
  deprecated_output_field: elements
  production_default_role: content_body
  production_visual_source: codex_image_gen_png_layers
  allowed_roles:
    - background
    - title
    - subtitle
    - content_body
    - diagram
    - annotation
    - summary
    - decoration
    - full_slide
  recommended_layers:
    - background
    - title
    - subtitle
    - content_body
    - diagram
    - annotation
    - summary
  fallback_layer:
    role: full_slide
    note: full_slide 只作为拆层来源和诊断兜底，不能作为合格生产动画的唯一图层。
  rules:
    - scene.json 使用 layers[]，每个 layer 必须是 type: png。
    - animation_timeline.events[].target 必须指向 scene.layers[].id。
    - 正式生产必须从 Codex Image Gen 整页位图裁切出多个 PNG 图层。
    - 主标题和副标题应从 Image Gen 位图裁切为独立 PNG 图层，不得由 Remotion 绘制。
    - 只有拆层失败诊断时才允许临时使用 full_slide 预览，不能视为生产完成。
    - 页面中间是开放内容区，不绘制大圆角外框或任何 enclosing content frame。
    - 底部字幕区不属于 PNG 主体内容，视频字幕由 Remotion 单独叠加。
    - Remotion 不渲染文字、线条、形状或分组元素。

visual_assets:
  template_reference_image: references/style_reference/PPT模板.png
  example_reference_image: references/style_reference/PPT示例.png
  image_style: warm_minimal_handdrawn_line_art
  diagram_style: handdrawn_explainer_diagram
  avoid:
    - 科技蓝黑风
    - 赛博朋克
    - 复杂 3D 背景
    - 大面积渐变
    - 金属质感
    - 强阴影
    - 儿童卡通大插画
    - AI 生成图里的乱码文字
    - 大面积装饰图形

subtitle:
  reserved_area:
    y: 930
    height: 150
  overlay:
    font_size: 38
    color: "#111111"
    background: warm_white_82
    border_radius: 24
    max_lines: 1
    max_cjk_chars: 28
    horizontal_margin: 180
    bottom: 28

animation:
  default_duration_sec: 0.6
  default_easing: easeOutCubic
  target_model: scene.layers[].id
  allowed_actions:
    - fade_in
    - fade_up
    - soft_zoom_in
    - slide_in_left
    - highlight
